<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Aster Life</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #e8e8ea;
      text-align: center;
    }
    .card { padding: 2rem; }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 0.5rem; }
    p { opacity: 0.7; margin: 0; }
    .dot { color: #8b5cf6; }
  </style>
</head>
<body>
  <main class="card">
    <h1>The Aster Life<span class="dot">.</span></h1>
    <p>Hello, world &mdash; the site is live.</p>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Aster Life</title>
  <meta name="color-scheme" content="dark" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <!-- Welcome — always visible -->
    <section id="welcome">
      <h1>Welcome To<br />The Aster Life<span class="dot">.</span></h1>
      <div class="welcome-copy">
        <p><strong>Congratulations! We couldn&rsquo;t be more proud.</strong></p>
        <p>
          This is placeholder copy - more of the real welcome message will
          live here. For now it just holds the space so the layout feels right.
        </p>
      </div>
    </section>

    <!-- The additive tree. The "Choose your own adventure" button is rendered
         by app.js as the root node inside #tree-flow. -->
    <div id="tree">
      <svg id="connectors" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="tree-flow"></div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="favorites.js"></script>
  <script src="app.js"></script>
</body>
</html>
